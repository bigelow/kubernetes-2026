apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: platform-observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          # 'contrib' build — redaction processor lives here, not in core.
          # Pinned to a specific release for reproducibility (bump deliberately);
          # never :latest in a cluster deployment.
          image: otel/opentelemetry-collector-contrib:0.155.0
          args: ["--config=/etc/otel/collector.yaml"]
          env:
            - name: DEPLOY_ENV
              value: "prod"
          ports:
            - containerPort: 4317   # OTLP gRPC
            - containerPort: 4318   # OTLP HTTP
          resources:                 # ADR-0009
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true   # collector writes nothing to the root FS with this config
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: platform-observability
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
    - name: otlp-http
      port: 4318
