# ADR-0007: CEL-based MutatingAdmissionPolicy (GA in v1.36) instead of a webhook server.
# Auto-injects a required cost-allocation label when one isn't set.
#
# VERIFIED 2026-07-01 against kindest/node v1.36.1: server-side dry-run accepts
# this policy, and live admission testing confirmed a new namespace with no
# labels gets cost-center=unassigned, while a namespace that already sets
# cost-center keeps its value AND any unrelated labels (SSA-merge).
# Implementation notes: hyphenated label keys can't use CEL dotted access
# (labels.cost-center parses as a subtraction), so all access below is
# bracket/`in`-based; ApplyConfiguration merges via server-side-apply
# semantics, so setting only the cost-center key preserves other labels.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingAdmissionPolicy
metadata:
  name: inject-cost-label
spec:
  # Never: single mutation on Namespace CREATE, no competing mutators
  # expected, and the expression is idempotent regardless.
  reinvocationPolicy: Never
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["namespaces"]
  mutations:
    - patchType: "ApplyConfiguration"
      applyConfiguration:
        expression: >
          Object{
            metadata: Object.metadata{
              labels: {
                "cost-center":
                  (has(object.metadata.labels) && "cost-center" in object.metadata.labels)
                    ? object.metadata.labels["cost-center"]
                    : "unassigned"
              }
            }
          }
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: inject-cost-label-binding
spec:
  policyName: inject-cost-label
  matchResources:
    namespaceSelector: {}
